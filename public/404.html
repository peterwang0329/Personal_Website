<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>汪章貴的個人網站</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When a 404 occurs, save the current path to sessionStorage
      // then redirect to the root so the SPA can handle routing
      var pathSegmentsToKeep = 1; // number of path segments to keep (1 = /personal-website/)

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
